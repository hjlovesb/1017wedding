<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />

  <!-- OG Meta (동적으로 config에서 채워짐) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-description" content="" />
  <meta property="og:image" id="og-image" content="" />

  <title id="page-title">모바일 청첩장</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400;500;600&family=Great+Vibes&family=Space+Mono:wght@400;700&family=Gowun+Batang:wght@400;700&family=Nanum+Pen+Script&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <!-- Intro / Thankyou image preload -->
  <link rel="preload" as="image" href="images/intro/intro-bg.png" />
  <link rel="preload" as="image" href="images/intro/envelope.png" />
  <link rel="preload" as="image" href="images/hero/1.png" />
</head>
<body>

  <!-- ========== Curtain / Veil Opening ========== -->
<div class="curtain" id="curtain">
  <div class="curtain__frame">
    <img class="curtain__image" src="images/intro/envelope.png" alt="봉투 모양 초대장" fetchpriority="high" decoding="sync" />
    <button class="curtain__seal-hit" id="curtain-open" type="button" aria-label="실링을 눌러 봉투를 엽니다">
      <span class="curtain__seal-ring" aria-hidden="true"></span>
    </button>
  </div>

  <div class="curtain__content">
    <p class="curtain__hint">
      <span class="curtain__hint-kr">청첩장 열기</span>
    </p>
  </div>
</div>

  <!-- ========== Toast ========== -->
  <div class="toast" id="toast"></div>

  <!-- ========== Background Music ========== -->
  <audio id="bgm" src="audio/bgm.mp3" preload="auto" autoplay playsinline></audio>

  <button class="music-toggle" id="music-toggle" type="button" aria-label="음악 켜기/끄기">
    <span class="music-toggle__icon" aria-hidden="true">♪</span>
  </button>


  <!-- ========== Main ========== -->
  <main class="invitation">

    <!-- ── Hero Section ── -->
    <section class="section hero hero--photo-text" id="hero">
      <div class="floral-frame">
        <div class="hero__photo-wrap">
          <img id="hero-img" src="" alt="웨딩 사진" loading="lazy" />
          <!-- Countdown -->
          <div class="countdown anim-target" id="countdown">
            <div class="countdown__item">
              <span class="countdown__num" id="cd-days">0</span>
              <span class="countdown__label">DAYS</span>
            </div>
            <div class="countdown__item">
              <span class="countdown__num" id="cd-hours">0</span>
              <span class="countdown__label">HOURS</span>
            </div>
            <div class="countdown__item">
              <span class="countdown__num" id="cd-minutes">0</span>
              <span class="countdown__label">MIN</span>
            </div>
            <div class="countdown__item">
              <span class="countdown__num" id="cd-seconds">0</span>
              <span class="countdown__label">SEC</span>
            </div>
          </div>
        </div>
      </div>

      <div class="hero__info anim-target">
        <h1 class="hero__names" id="hero-names"></h1>
        <p class="hero__date" id="hero-date"></p>
        <p class="hero__venue" id="hero-venue"></p>
      </div>
    </section>

    
    <!-- ── Greeting Section ── -->
    <section class="section greeting" id="greeting">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font" id="greeting-title"></h2>
        <p class="greeting__text" id="greeting-text"></p>
        <div class="greeting__parents" id="greeting-parents"></div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <!-- ── Calendar Section ── -->
    <section class="section calendar-section" id="calendar-section">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Wedding Day</h2>
        <div class="calendar" id="calendar"></div>
      </div>
    </section>
    <!-- ── Our Story: 유색 패널 안, 벽에 건 두 액자 + 나비 피날레 ── -->
    <section class="section ourstory" id="letter">
      <div class="section__inner anim-target">

        <p class="ourstory__eyebrow">OUR STORY</p>

        <div class="ourstory__panel">
          <div class="storyframes">
            <!-- 2024 · 은색 액자 (왼쪽) -->
            <figure class="storyframe storyframe--left" data-reveal>
              <p class="storyframe__yearline storyframe__yearline--left" aria-hidden="true">2024</p>
              <div class="storyframe__img">
                <img src="images/story/story-2024.png" alt="2024년 상빈이 현준에게 쓴 자필 편지가 담긴 액자" loading="lazy" decoding="async" draggable="false" />
              </div>
            </figure>

            <!-- 2025 · 하늘색 액자 (오른쪽·가로형) -->
            <figure class="storyframe storyframe--right storyframe--wide" data-reveal>
              <p class="storyframe__yearline storyframe__yearline--right" aria-hidden="true">2025</p>
              <div class="storyframe__img">
                <img src="images/story/story-2025.png" alt="2025년 현준이 상빈에게 쓴 자필 편지가 담긴 액자" loading="lazy" decoding="async" draggable="false" />
              </div>
            </figure>
          </div>

          <!-- 2026 · 나비 피날레 -->
          <div class="finale2026" id="rings-finale">
            <div class="bf-stage" aria-hidden="true" id="bf-stage">
              <div class="bf-stack" id="footer-wine-frames"><img src="images/footer/00.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:1!important" /><img src="images/footer/01.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/02.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/03.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/04.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/05.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/06.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/07.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/08.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/09.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/10.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/11.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/12.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/13.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/14.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/15.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/16.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/17.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/18.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/19.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/20.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /></div>
              <div class="bf-glow"></div>
              <div class="bf-vig"></div>
            </div>
            <p class="finale2026__year">2026. 10. 17</p>
            <p class="finale2026__text">그리고, 영원이라는 계절로</p>
          </div>
        </div>

      </div>
      <div class="floral-divider"></div>
    </section>

    <!-- ── Gallery ── -->
    <section class="section gallery" id="gallery">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Gallery</h2>
      </div>
      <div class="gallery__grid" id="gallery-grid"></div>
      <div class="floral-divider"></div>
    </section>

    <!-- ── Location ── -->
    <section class="section location" id="location">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Location</h2>
        <p class="location__venue" id="loc-venue"></p>
        <p class="location__hall" id="loc-hall"></p>
        <p class="location__address" id="loc-address"></p>
        <p class="location__tel" id="loc-tel"></p>
        <div class="location__map-wrap" id="loc-map-wrap"></div>

        <div class="location__buttons location__buttons--maps">
          <a class="btn btn--outline" id="btn-kakao-map" href="" target="_blank" rel="noopener">
            카카오맵
          </a>
          <a class="btn btn--outline" id="btn-naver-map" href="" target="_blank" rel="noopener">
            네이버 지도
          </a>
          <a class="btn btn--outline" id="btn-tmap" href="" target="_blank" rel="noopener">
            티맵
          </a>
        </div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <!-- ── Account (축의금) ── -->
    <section class="section account" id="account">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Celebration</h2>
        <p class="account__subtitle">전해주시는 축하의 마음,<br />감사히 간직하며 행복하게 살아가겠습니다.</p>

        <!-- 신랑측 -->
        <div class="accordion" id="acc-groom">
          <button class="accordion__toggle" data-target="acc-groom-body">
            <span>신랑측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__body" id="acc-groom-body"></div>
        </div>

        <!-- 신부측 -->
        <div class="accordion" id="acc-bride">
          <button class="accordion__toggle" data-target="acc-bride-body">
            <span>신부측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__body" id="acc-bride-body"></div>
        </div>
      </div>
    </section>

    <!-- ── Footer: 와인빛 피날레 — 백조 프레임 애니메이션 + 이름/날짜 + 공유 버튼 ── -->
    <div class="footer-wine2" aria-label="마무리">
      <div class="footer-wine2__lake" id="footer-swan-stage" aria-hidden="true">
        <div class="footer-wine2__lake-stack" id="footer-swan-frames"><img src="images/footer/swan-seq-00.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:1!important" /><img src="images/footer/swan-seq-01.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-02.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-03.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-04.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-05.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-06.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-07.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-08.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-09.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-10.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /><img src="images/footer/swan-seq-11.png" alt="" loading="lazy" decoding="async" draggable="false" style="opacity:0!important" /></div>
        <div class="footer-wine2__lake-glow"></div>
        <div class="footer-wine2__lake-vignette"></div>
      </div>

      <p class="footer-wine2__names">이현준 &middot; 박상빈</p>
      <p class="footer-wine2__date">2026. 10. 17.</p>

      <div class="share-buttons footer-wine2__share">
        <button class="share-btn share-btn--wine" id="btn-copy-address-bottom" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>주소 복사</span>
        </button>
        <button class="share-btn share-btn--wine" id="btn-kakao-share" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.66-.15.52-.96 3.32-.99 3.54 0 0-.02.17.09.23.11.07.24.02.24.02.32-.05 3.66-2.4 4.24-2.81.57.08 1.16.13 1.76.13 5.52 0 10-3.54 10-7.9S17.52 3 12 3z"/></svg>
          <span>카카오톡 공유</span>
        </button>
      </div>
    </div>

  </main>

  <!-- ========== Photo Viewer Modal ========== -->
  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer__backdrop"></div>
    <button class="viewer__close" id="viewer-close" aria-label="닫기">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="viewer__counter" id="viewer-counter"></div>
    <div class="viewer__track" id="viewer-track"></div>
    <button class="viewer__nav viewer__nav--prev" id="viewer-prev" aria-label="이전">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="viewer__nav viewer__nav--next" id="viewer-next" aria-label="다음">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <!-- ========== Attendance RSVP Modal - Editorial Soft Blue ========== -->
  <div class="rsvp-modal" id="attendModal" aria-hidden="true">
    <div class="rsvp-modal__backdrop" data-rsvp-close></div>

    <section class="rsvp-modal__panel" role="dialog" aria-modal="true" aria-labelledby="rsvp-title">
      <button class="rsvp-modal__close" id="rsvp-close" type="button" aria-label="닫기">&times;</button>

      <h2 class="rsvp-modal__title" id="rsvp-title">참석 여부</h2>
      <p class="rsvp-modal__summary">
        <strong><span id="rsvp-groom-name">이현준</span> &amp; <span id="rsvp-bride-name">박상빈</span></strong><br />
        <span id="rsvp-date-text">2026.10.17. 토요일 오후 4시 20분</span><br />
        <span id="rsvp-venue-text">나비스퀘어 나비홀</span>
      </p>

      <form class="rsvp-form" id="rsvp-form">
        <label class="rsvp-label" for="rsvp-name">성함</label>
        <input class="rsvp-input" id="rsvp-name" name="name" type="text" placeholder="예) 홍길동" maxlength="20" autocomplete="name" required />

        <div class="rsvp-choice-group" role="radiogroup" aria-label="참석 여부">
          <input id="rsvp-attend" name="attendance" type="radio" value="attend" checked />
          <label for="rsvp-attend">참석</label>

          <input id="rsvp-absent" name="attendance" type="radio" value="absent" />
          <label for="rsvp-absent">불참</label>
        </div>

        <div class="rsvp-counter" id="rsvp-counter" aria-label="참석 인원 선택">
          <button type="button" id="rsvp-minus" aria-label="참석 인원 감소">−</button>
          <span id="rsvp-count" data-count="1">1명</span>
          <button type="button" id="rsvp-plus" aria-label="참석 인원 증가">＋</button>
        </div>
        <p class="rsvp-help" id="rsvp-help">본인 포함 참석 인원</p>

        <button class="rsvp-submit" id="rsvp-submit" type="submit">전달하기</button>

        <label class="rsvp-hide-today">
          <input id="rsvp-hide-today" type="checkbox" />
          <span>오늘 하루 보지 않기</span>
        </label>

        <p class="rsvp-message" id="rsvp-message" aria-live="polite"></p>
      </form>
    </section>
  </div>


  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="music.js"></script>
  <script src="rsvp.js"></script>
</body>
</html>
